        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        .holiday-gh { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; z-index: 10; cursor: pointer; transition: all 0.2s; }
        .holiday-rh { background-color: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; opacity: 0.9; cursor: pointer; transition: all 0.2s; }
        .sat-sun { background-color: #f0fdf4; color: #15803d; font-weight: 900; }

        .dark .holiday-gh { background-color: #450a0a; color: #fecaca; border-color: #7f1d1d; }
        .dark .holiday-rh { background-color: #172554; color: #bfdbfe; border-color: #1e3a8a; }
        .dark .sat-sun { background-color: #052e16; color: #86efac; }

        .holiday-gh:hover, .holiday-rh:hover { transform: scale(1.05); z-index: 20; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }

        .date-cell { min-height: 4.5rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5px; border-radius: 6px; position: relative; }
        .holiday-label { font-size: 0.55rem; line-height: 0.7rem; text-align: center; margin-top: 2px; padding: 0 2px; word-break: break-word; font-weight: 700; text-transform: uppercase; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .special-day-glow {
            box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.4);
            border: 2px solid #ffd700 !important;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 20px 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        #expanded-image-container.active {
            display: flex;
            animation: zoomIn 0.3s ease-out forwards;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

            { date: '2026-12-25', name: 'Christmas Day', description: 'An annual festival commemorating the birth of Jesus Christ.' }
        ];

        const rh = [
            { date: '2026-01-01', name: 'New Year Day', description: 'The first day of the year on the modern Gregorian calendar.' },
            { date: '2026-01-13', name: 'Lohri', description: 'A popular winter folk festival celebrated primarily in Northern India.' },
            { date: '2026-01-14', name: 'Makar Sankranti', description: 'Dedicated to the deity Surya (Sun), marking the sun\'s transit into Makara (Capricorn).' },
            { date: '2026-01-15', name: 'Magha Bihu/Pongal', description: 'Harvest festivals celebrated in Assam (Magh Bihu) and Tamil Nadu (Pongal).' },

            { date: '2026-04-14', name: 'Ambedkar Jayanti', description: 'Baba Saheb Dr. B. R. Ambedkar jayanti and Harvest festivals celebrated in Punjab (Vaisakhi) and Kerala (Vishu).' },

            { date: '2026-09-14', name: 'Ganesh Chaturthi', description: 'Celebrates the arrival of Lord Ganesh to earth.' },

            { date: '2026-10-26', name: 'Maharishi Valmiki Birthday', description: 'Birth anniversary of the sage Valmiki, the author of the epic Ramayana.' },
            { date: '2026-10-29', name: 'Karaka Chaturthi', description: 'Also known as Karwa Chauth, where married women fast for the longevity of their husbands.' },
            { date: '2026-11-07', name: 'Naraka Chaturdasi', description: 'Celebrated one day before Diwali, marking the defeat of Narakasura.' },
            { date: '2026-11-09', name: 'Govardhan Puja', description: 'Devotees prepare and offer a large variety of vegetarian food to Krishna.' },
            { date: '2026-11-10', name: 'Bhai Dooj', description: 'Similar to Raksha Bandhan, celebrating the bond between brothers and sisters.' },
            { date: '2026-11-16', name: 'Chhath Puja', description: 'A festival dedicated to the Sun God (Surya) and Chhathi Maiya.' },
            { date: '2026-11-20', name: 'Guru Teg Bahadur Day', description: 'Commemorates the martyrdom of the ninth Sikh Guru.' },
            { date: '2026-12-24', name: 'Christmas Eve', description: 'The evening or entire day before Christmas Day.' },
            { date: '2026-07-03', name: 'Nvn\'s Birthday', description: 'The Birthday Celebration of Navin Arya (Personal), Not Restricted Holiday.' }
        ];

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const dayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

        function generateCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let m = 0; m < 12; m++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = "bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col hover:shadow-md transition-shadow transition-colors";

                let html = `<h3 class="font-bold text-base text-slate-800 dark:text-slate-100 mb-4 text-center border-b dark:border-slate-700 pb-2 flex justify-between items-center px-2">
                                <span>${monthNames[m]} 2026</span>
                                <span class="text-xs font-normal text-slate-400 dark:text-slate-500">${String(m + 1).padStart(2, '0')}</span>
                            </h3>`;
                html += `<div class="grid grid-cols-7 text-center text-[0.65rem] font-extrabold text-slate-400 dark:text-slate-500 mb-2 uppercase tracking-wide">`;
                dayLabels.forEach(d => html += `<div>${d}</div>`);
                html += `</div>`;
                html += `<div class="grid grid-cols-7 gap-1 text-center">`;

                const firstDay = new Date(2026, m, 1).getDay();
                const daysInMonth = new Date(2026, m + 1, 0).getDate();
                const startOffset = firstDay === 0 ? 6 : firstDay - 1;

                for (let i = 0; i < startOffset; i++) html += `<div class="date-cell"></div>`;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const ghHolidays = gh.find(h => h.date === dateStr);
                    const rhHolidays = rh.find(h => h.date === dateStr);
                    const dayOfWeek = new Date(2026, m, d).getDay();
                    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                    let cellClass = "date-cell ";
                    let label = "";
                    let clickHandler = "";

                    if (ghHolidays) {
                        cellClass += "holiday-gh";
                        label = ghHolidays.name;
                        const safeName = ghHolidays.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        const safeDesc = ghHolidays.description.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        clickHandler = `onclick="openModal('${safeName}', '${dateStr}', 'Gazetted Holiday', '${safeDesc}')"`;
                    } else if (rhHolidays) {
                        cellClass += "holiday-rh";
                        label = rhHolidays.name;
                        const safeName = rhHolidays.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        const safeDesc = rhHolidays.description.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        clickHandler = `onclick="openModal('${safeName}', '${dateStr}', 'Restricted Holiday', '${safeDesc}')"`;
                    } else if (isWeekend) {
                        cellClass += "sat-sun";
                    } else {
                        cellClass += "text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors";
                    }

                    html += `<div class="${cellClass}" ${clickHandler}>
                                <span class="text-sm font-black">${d}</span>
                                ${label ? `<span class="holiday-label">${label}</span>` : ''}
                             </div>`;
                }

                html += `</div>`;
                monthDiv.innerHTML = html;
                grid.appendChild(monthDiv);
            }
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function triggerConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 110 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        }

        function openModal(title, dateStr, type, description) {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            const dateObj = new Date(dateStr);
            const formattedDate = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' });

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-date').innerText = formattedDate;
            document.getElementById('modal-type').innerText = type;
            document.getElementById('modal-desc').innerText = description;

            const header = document.getElementById('modal-header');
            const typeBadge = document.getElementById('modal-type');

            if (type.includes('Gazetted')) {
                header.className = "p-6 text-white bg-gradient-to-br from-red-600 to-red-800 dark:from-red-800 dark:to-red-950";
                typeBadge.className = "inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-white/20 mb-2 text-white";
            } else {
                header.className = "p-6 text-slate-800 bg-gradient-to-br from-blue-100 to-blue-300 dark:from-blue-900 dark:to-slate-900 dark:text-white";
                typeBadge.className = "inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-black/10 dark:bg-white/10 mb-2 text-blue-900 dark:text-blue-100";
            }

            if (title.toLowerCase().includes("nvn's birthday")) {
                content.classList.add('special-day-glow');
                triggerConfetti();
            } else {
                content.classList.remove('special-day-glow');
            }

            backdrop.classList.remove('hidden');
            content.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.add('opacity-100');
                content.classList.add('opacity-100', 'scale-100');
            }, 10);
        }

        function openProfileModal() {
            const backdrop = document.getElementById('modal-backdrop');
            const profileContent = document.getElementById('profile-modal');
            backdrop.classList.remove('hidden');
            profileContent.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.add('opacity-100');
                profileContent.classList.add('opacity-100', 'scale-100');
            }, 10);
        }

        function closeModal() {
            const backdrop = document.getElementById('modal-backdrop');
            const holidayContent = document.getElementById('modal-content');
            const profileContent = document.getElementById('profile-modal');

            backdrop.classList.remove('opacity-100');
            if (holidayContent) {
                holidayContent.classList.remove('opacity-100', 'scale-100');
                setTimeout(() => holidayContent.classList.remove('special-day-glow'), 300);
            }
            if (profileContent) profileContent.classList.remove('opacity-100', 'scale-100');

            setTimeout(() => {
                backdrop.classList.add('hidden');
                if (holidayContent) holidayContent.classList.add('hidden');
                if (profileContent) profileContent.classList.add('hidden');
            }, 300);
        }

        function expandImage(src) {
            const expander = document.getElementById('expanded-image-container');
            const img = document.getElementById('expanded-profile-img');
            img.src = src;
            expander.classList.remove('hidden');
            expander.classList.add('active');
        }

        function closeImageExpander() {
            const expander = document.getElementById('expanded-image-container');
            expander.classList.add('hidden');
            expander.classList.remove('active');
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
                closeImageExpander();
            }
        });

        window.onload = generateCalendar;
    </script>
</body>
</html>
